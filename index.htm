<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>


    <div id="calculator">
        <input id="display" readonly>
        <div id="keys" >
            <button style="background-color: orange; color: white;" onclick="addToDisplay('+')">+</button>
            <button onclick="addToDisplay('7')">7</button>
            <button onclick="addToDisplay('8')">8</button>
            <button onclick="addToDisplay('9')">9</button><br>
            <button style="background-color: orange; color: white;" onclick="addToDisplay('-')">-</button>
            <button onclick="addToDisplay('4')">4</button>
            <button onclick="addToDisplay('5')">5</button>
            <button onclick="addToDisplay('6')">6</button><br>
            <button style="background-color: orange; color: white;" onclick="addToDisplay('*')">*</button>
            <button onclick="addToDisplay('1')">1</button>
            <button onclick="addToDisplay('2')">2</button>
            <button onclick="addToDisplay('3')">3</button><br>
            <button style="background-color: orange; color: white;" onclick="addToDisplay('/')">/</button>
            <button style="background-color: green; color: white;"class="cal-btn" onclick="calDisplay()">=</button>
            <button style="background-color: rgb(238, 235, 233); color: rgb(0, 0, 0);"onclick="clearDisplay()">C</button>
            <button onclick="addToDisplay('0')">0</button><br>


        </div>

    </div>



    <script src="/index.js"></script>
</body>
</html>
